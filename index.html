<!-- PAGINA 2: menu.html -->
<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meniu</title>
<style>
body{margin:0;font-family:Poppins;background:#111827;color:white}
nav{display:flex;justify-content:space-between;padding:20px;background:#020617}
.cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:40px}
.card{background:#1f2933;padding:20px;border-radius:10px;width:250px}
.card img{width:100%}
button{margin-top:10px;padding:10px;background:#22c55e;border:none;color:white}
</style>
</head>
<body>
<nav>
<h1>GHITA Pizza</h1>
<div>
<a href="index.html">Acasă</a>
<a href="menu.html">Meniu</a>
<a href="order.html">Comandă</a>
</div>
</nav>
<div class="cards" id="menu"></div>

<script>
const pizzas=[
['Margherita',25],['Pepperoni',28],['Quattro',32],['Diavola',30],
['Capriciosa',29],['Hawaiian',27],['Veggie',26],['BBQ',33],
['Prosciutto',31],['Speciala',35]
];

let container=document.getElementById('menu');
pizzas.forEach(p=>{
container.innerHTML+=`<div class='card'>
<img src='https://source.unsplash.com/300x200/?pizza&${p[0]}'>
<h3>${p[0]}</h3>
<p>${p[1]} RON</p>
<a href='order.html'><button>Comandă</button></a>
</div>`;
});
</script>
</body>
</html>
